<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#FF6B35"/>

  <!-- Fork (left) -->
  <g fill="white" stroke="white" stroke-linecap="round">
    <!-- Fork handle -->
    <rect x="23" y="34" width="3" height="16" rx="1.5"/>
    <!-- Fork neck -->
    <rect x="23" y="26" width="3" height="10" rx="1"/>
    <!-- Fork tines -->
    <rect x="21" y="14" width="1.5" height="12" rx="0.75"/>
    <rect x="24" y="14" width="1.5" height="12" rx="0.75"/>
    <rect x="27" y="14" width="1.5" height="12" rx="0.75"/>
  </g>

  <!-- Knife (right) -->
  <g fill="white">
    <!-- Knife handle -->
    <rect x="38" y="34" width="3" height="16" rx="1.5"/>
    <!-- Knife blade -->
    <path d="M38 14 Q42 18 41 34 L38 34 Z"/>
