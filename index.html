<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>저녁 메뉴 추천기</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DLC5JM9JN6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-DLC5JM9JN6');

    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "w1sb8pkzxx");
    </script>
</head>
<body>
    <button id="theme-toggle">🌙 Dark Mode</button>
    <a href="en.html" id="lang-toggle">🌐 English</a>
    <div class="container">
        <h1>🍽️ 저녁 메뉴 추천기</h1>
        <p class="subtitle">오늘 저녁 뭐 먹을지 고민되시나요?</p>
        <div class="menu-card" id="menu-card">
            <img class="menu-image" id="menu-image" src="" alt="" style="display:none;">
            <div class="menu-emoji" id="menu-emoji">🍴</div>
            <div class="menu-name" id="menu-name">버튼을 눌러 메뉴를 추천받아보세요!</div>
            <div class="menu-category" id="menu-category"></div>
        </div>
        <button id="recommend-btn">🎲 메뉴 추천받기</button>

        <div class="animal-test-section">
            <a href="animal.html" class="animal-test-btn">🐶🐱 나는 강아지상? 고양이상? 테스트하기</a>
        </div>

        <div class="partnership-section">
            <h2>🤝 제휴 문의</h2>
            <p class="partnership-desc">레스토랑, 식품 브랜드 등 제휴에 관심 있으신가요?</p>
            <form class="partnership-form" action="https://formspree.io/f/mwvrdrgq" method="POST">
                <input type="text" name="name" placeholder="이름 / 회사명" required>
                <input type="email" name="email" placeholder="이메일" required>
                <textarea name="message" placeholder="문의 내용" rows="4" required></textarea>
                <button type="submit">문의 보내기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
