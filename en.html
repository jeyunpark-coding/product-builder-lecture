<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Menu Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌙 Dark Mode</button>
    <a href="index.html" id="lang-toggle">🌐 한국어</a>
    <div class="container">
        <h1>🍽️ Dinner Menu Recommender</h1>
        <p class="subtitle">Not sure what to have for dinner tonight?</p>
        <div class="menu-card" id="menu-card">
            <div class="menu-emoji" id="menu-emoji">🍴</div>
            <div class="menu-name" id="menu-name">Press the button to get a recommendation!</div>
            <div class="menu-category" id="menu-category"></div>
        </div>
        <button id="recommend-btn">🎲 Recommend a Menu</button>
    </div>
    <script src="en.js"></script>
</body>
</html>
